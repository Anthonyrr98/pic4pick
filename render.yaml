services:
  - type: web
    name: pic4pick-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        value: https://pic.rlzhao.com
      - key: LOG_LEVEL
        value: info
      - key: ENABLE_FILE_LOGGING
        value: "false"
      - key: SUPABASE_URL
        value: https://iwlwbnvhgxlnqozduhrp.supabase.co
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ALIYUN_OSS_REGION
        sync: false
      - key: ALIYUN_OSS_BUCKET
        sync: false
      - key: ALIYUN_OSS_ACCESS_KEY_ID
        sync: false
      - key: ALIYUN_OSS_ACCESS_KEY_SECRET
        sync: false
